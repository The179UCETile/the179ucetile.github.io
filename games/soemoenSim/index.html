<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="/styles.css">
    <title>py_alt simulator</title>
    <link rel="icon" type="image/x-icon" href="/images/favicons/placeholder.png">
  </head>
  <body>
    <header>
      <p>
        <span id="mainCurrency" style="font-size:20px">Loading...</span><br>
        <span id="uselessCurrency">and 0 people are annoyed by your begging</span>
      </p>
    </header>
    <div>
      <p id="itemsBeggedPC">+1 item begged per click</p>
      <button id="beg">Beg for a random item</button><br>
      <div>
        <button disabled class="upg" id="mainUpg1">
          Increase beg power.<br>
          <span class="btn" id="mainUpg1Stats">
            Currently: +0<br>
            Cost: 10 items
          </span>
        </button>
        <button disabled class="upg" id="mainUpg2">
          Increase beg power even more.<br>
          <span class="btn" id="mainUpg2Stats">
            Currently: x1<br>
            Cost: 80 items
          </span>
        </button>
      </div>
      <button id="hardReset" style="background-color: #f00;">HARD RESET</button>
    </div>
    <script src="/game_scripts/break_eternity.min.js"></script>
    <script src="/game_scripts/eternal_notations.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
