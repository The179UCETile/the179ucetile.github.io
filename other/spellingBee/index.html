<!DOCTYPE html>
<html>
  <head>
    <title>The179UCETile's Spelling Bee</title>
    <link rel="icon" type="image/x-icon" href="/images/favicons/placeholder.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,slnt,wdth,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,-10..0,25..151,100..1000,96,468,79,-203,738,514,712&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <div id="main">
        <div id="word">
          <p>???</p>
        </div>
        <div id="timeRemaining">
          <p>?.??s</p>
        </div>
        <div>
          <input type="text" id="wordInput" placeholder="type the word here">
          <button id="check">Enter</button>
        </div>
      </div>
      <div id="gameover" style="display:none;">
        <div>
          <p>Game over!</p>
          <button id="retry">Retry</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
