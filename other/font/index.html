<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="styles.css">
    <title>Font displayer</title>
    <link rel="icon" type="image/x-icon" href="/images/favicons/placeholder.png">
  </head>
  <body>
    <p><a href="/other">Go back</a></p>
    <h1>Font displayer</h1>
    <label for="font">Choose a font:</label>
    <select id="font" oninput="document.getElementById('txt').style.fontFamily = document.getElementById('font').value + ', sans-serif'">
      <option value="'monospace textwall em'" selected>Monospace Textwall</option>
      <option value="deltas font">Delta's font</option>
      <option value="pixel ayako">Pixel Ayako</option>
      <option value="thegreengreen09">Thegreengreen09</option>
      <option value="braille octant">Braille Octant [WARNING: UNREADABLE]</option>
    </select>
    <br>
    <textarea id="txt" style="font-family: 'monospace textwall em'">Hello, World!</textarea>
    <h2>Notes for fonts</h2>
    <ul>
      <li><b>Pixel Ayako</b>: Use U+F0000 - U+F000B for characters seen in ~TimeMachine-2s4/fonts, and U+100000 - U+100008 for unofficial Unicode symbols by Setsumi2s4.</li>
    </ul>
  </body>
</html>
